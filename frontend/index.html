<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Task Manager</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Notification -->
    <div id="toast" class="toast"></div>

    <!-- Authentication Section -->
    <section id="authSection" class="auth-wrapper">

        <div class="auth-container">

            <div class="auth-header">
                <h1>TaskFlow</h1>
                <p>Manage your daily tasks efficiently</p>
            </div>

            <div class="auth-tabs">
                <button id="loginTab" class="tab-btn active">
                    Login
                </button>

                <button id="registerTab" class="tab-btn">
                    Register
                </button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form">

                <div class="form-group">
                    <label>Username</label>
                    <input
                        type="text"
                        id="loginUsername"
                        placeholder="Enter username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input
                        type="password"
                        id="loginPassword"
                        placeholder="Enter password"
                        required
                    >
                </div>

                <button type="submit" class="primary-btn">
                    Login
                </button>

            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form hidden">

                <div class="form-group">
                    <label>Username</label>
                    <input
                        type="text"
                        id="registerUsername"
                        minlength="3"
                        maxlength="50"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input
                        type="email"
                        id="registerEmail"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input
                        type="password"
                        id="registerPassword"
                        minlength="6"
                        required
                    >
                </div>

                <button type="submit" class="primary-btn">
                    Create Account
                </button>

            </form>

        </div>
    </section>

    <!-- Dashboard -->
    <section id="dashboardSection" class="dashboard hidden">

        <!-- Top Navbar -->
        <header class="navbar">

            <div>
                <h2>TaskFlow</h2>
            </div>

            <div class="user-section">

                <div class="user-info">
                    <span id="userName"></span>
                    <small id="userEmail"></small>
                </div>

                <button id="logoutBtn" class="danger-btn">
                    Logout
                </button>

            </div>

        </header>

        <!-- Main Content -->
        <main class="dashboard-content">

            <!-- Create Task -->
            <section class="panel">

                <div class="section-title">
                    <h3>Create New Task</h3>
                </div>

                <form id="taskForm">

                    <div class="task-form-grid">

                        <div class="form-group">
                            <label>Title</label>
                            <input
                                type="text"
                                id="taskTitle"
                                maxlength="100"
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label>Priority</label>

                            <select id="taskPriority">

                                <option value="1">
                                    1 - Low
                                </option>

                                <option value="2">
                                    2
                                </option>

                                <option value="3" selected>
                                    3 - Medium
                                </option>

                                <option value="4">
                                    4
                                </option>

                                <option value="5">
                                    5 - Critical
                                </option>

                            </select>
                        </div>

                    </div>

                    <div class="form-group">
                        <label>Description</label>

                        <textarea
                            id="taskDescription"
                            rows="4"
                            required
                        ></textarea>
                    </div>

                    <div class="task-options">

                        <label class="checkbox-wrapper">
                            <input
                                type="checkbox"
                                id="taskCompleted"
                            >
                            Mark as completed
                        </label>

                        <button type="submit" class="primary-btn">
                            Add Task
                        </button>

                    </div>

                </form>

            </section>

            <!-- Filters -->
            <section class="panel">

                <div class="section-title">
                    <h3>Search & Filters</h3>
                </div>

                <div class="filter-grid">

                    <input
                        type="text"
                        id="searchInput"
                        placeholder="Search by title..."
                    >

                    <select id="statusFilter">

                        <option value="">
                            All Tasks
                        </option>

                        <option value="false">
                            Pending
                        </option>

                        <option value="true">
                            Completed
                        </option>

                    </select>

                    <select id="sortBy">

                        <option value="id">
                            Sort by ID
                        </option>

                        <option value="title">
                            Sort by Title
                        </option>

                    </select>

                    <select id="orderBy">

                        <option value="desc">
                            Descending
                        </option>

                        <option value="asc">
                            Ascending
                        </option>

                    </select>

                    <button id="applyFiltersBtn" type="button" class="secondary-btn">
                        Apply Filters
                    </button>

                    <button id="clearFiltersBtn" type="button" class="outline-btn">
                        Clear
                    </button>

                </div>

            </section>

            <!-- Task Statistics -->
            <section class="stats-bar">

                <div class="stat-item">
                    <span id="totalTasks">0</span>
                    <p>Total Tasks</p>
                </div>

                <div class="stat-item">
                    <span id="pendingTasks">0</span>
                    <p>Pending</p>
                </div>

                <div class="stat-item">
                    <span id="completedTasks">0</span>
                    <p>Completed</p>
                </div>

            </section>

            <!-- Task List -->
            <section class="panel">

                <div class="section-title">
                    <h3>Your Tasks</h3>
                </div>

                <div class="task-table-wrapper">

                    <table class="task-table">

                        <thead>

                            <tr>
                                <th>ID</th>
                                <th>Priority</th>
                                <th>Title</th>
                                <th>Description</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>

                        </thead>

                        <tbody id="taskList">

                            <!-- JS Injected -->

                        </tbody>

                    </table>

                </div>

                <!-- Pagination -->
                <div class="pagination">

                    <button id="prevBtn" class="outline-btn">
                        Previous
                    </button>

                    <span id="pageInfo">
                        Page 1
                    </span>

                    <button id="nextBtn" class="outline-btn">
                        Next
                    </button>

                </div>

            </section>

        </main>

    </section>

    <!-- Edit Modal -->
    <div id="editModal" class="modal hidden">

        <div class="modal-content">

            <div class="modal-header">
                <h3>Edit Task</h3>

                <button
                    id="closeModalBtn"
                    class="close-btn"
                >
                    ×
                </button>
            </div>

            <form id="editTaskForm">

                <input
                    type="hidden"
                    id="editTaskId"
                >

                <div class="form-group">

                    <label>Title</label>

                    <input
                        type="text"
                        id="editTitle"
                        required
                    >

                </div>

                <div class="form-group">

                    <label>Description</label>

                    <textarea
                        id="editDescription"
                        rows="4"
                        required
                    ></textarea>

                </div>

                <div class="form-group">

                    <label>Priority</label>

                    <select id="editPriority">

                        <option value="1">1 - Low</option>
                        <option value="2">2</option>
                        <option value="3">3 - Medium</option>
                        <option value="4">4</option>
                        <option value="5">5 - Critical</option>

                    </select>

                </div>

                <div class="checkbox-wrapper">

                    <input
                        type="checkbox"
                        id="editCompleted"
                    >

                    <label>
                        Completed
                    </label>

                </div>

                <button
                    type="submit"
                    class="primary-btn full-width"
                >
                    Update Task
                </button>

            </form>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
