<section id="authSection" class="auth-wrapper">

    <div class="auth-container">

        <div class="auth-header">
            <h1>TaskFlow</h1>
            <p>Manage your daily tasks efficiently</p>
        </div>

        <div class="auth-tabs">
            <button id="loginTab" class="tab-btn active">
                Login
            </button>

            <button id="registerTab" class="tab-btn">
                Register
            </button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form">

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUsername" placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password" required>
            </div>

            <button type="submit" class="primary-btn">
                Login
            </button>

        </form>

        <!-- Register Form -->
        <form id="registerForm" class="auth-form hidden">

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="registerUsername" placeholder="Enter Username" minlength="3" maxlength="50"
                    required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="registerEmail" placeholder="Enter Email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="registerPassword" placeholder="Enter Password" minlength="6" required>
            </div>

            <button type="submit" class="primary-btn">
                Create Account
            </button>

        </form>

    </div>
</section>
