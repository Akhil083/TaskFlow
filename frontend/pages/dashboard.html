<!-- Dashboard -->
<section id="dashboardSection" class="dashboard hidden">

    <!-- Top Navbar -->
    <header class="navbar">

        <div>
            <h2>TaskFlow</h2>
        </div>

        <div class="user-section">

            <div class="user-info">
                <span id="userName"></span>
                <small id="userEmail"></small>
            </div>

            <button id="logoutBtn" class="danger-btn">
                Logout
            </button>

        </div>

    </header>

    <!-- Main Content -->
    <main class="dashboard-content">

        <!-- Create Task -->
        <section class="panel">

            <div class="section-title">
                <h3>Create New Task</h3>
            </div>

            <form id="taskForm">

                <div class="task-form-grid">

                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="taskTitle" maxlength="100" required>
                    </div>

                    <div class="form-group">
                        <label>Priority</label>

                        <select id="taskPriority">

                            <option value="1">
                                1 - Low
                            </option>

                            <option value="2">
                                2
                            </option>

                            <option value="3" selected>
                                3 - Medium
                            </option>

                            <option value="4">
                                4
                            </option>

                            <option value="5">
                                5 - Critical
                            </option>

                        </select>
                    </div>

                </div>

                <div class="form-group">
                    <label>Description</label>

                    <textarea id="taskDescription" rows="4" required></textarea>
                </div>

                <div class="task-options">

                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="taskCompleted">
                        Mark as completed
                    </label>

                    <button type="submit" class="primary-btn">
                        Add Task
                    </button>

                </div>

            </form>

        </section>

        <!-- Filters -->
        <section class="panel">

            <div class="section-title">
                <h3>Search & Filters</h3>
            </div>

            <div class="filter-grid">

                <input type="text" id="searchInput" placeholder="Search by title...">

                <select id="statusFilter">

                    <option value="">
                        All Tasks
                    </option>

                    <option value="false">
                        Pending
                    </option>

                    <option value="true">
                        Completed
                    </option>

                </select>

                <select id="sortBy">

                    <option value="id">
                        Sort by ID
                    </option>

                    <option value="title">
                        Sort by Title
                    </option>

                </select>

                <select id="orderBy">

                    <option value="desc">
                        Descending
                    </option>

                    <option value="asc">
                        Ascending
                    </option>

                </select>

                <button id="applyFiltersBtn" type="button" class="secondary-btn">
                    Apply Filters
                </button>

                <button id="clearFiltersBtn" type="button" class="outline-btn">
                    Clear
                </button>

            </div>

        </section>

        <!-- Task Statistics -->
        <section class="stats-bar">

            <div class="stat-item">
                <span id="totalTasks">0</span>
                <p>Total Tasks</p>
            </div>

            <div class="stat-item">
                <span id="pendingTasks">0</span>
                <p>Pending</p>
            </div>

            <div class="stat-item">
                <span id="completedTasks">0</span>
                <p>Completed</p>
            </div>

        </section>

        <!-- Task List -->
        <section class="panel">

            <div class="section-title">
                <h3>Your Tasks</h3>
            </div>

            <div class="task-table-wrapper">

                <table class="task-table">

                    <thead>

                        <tr>
                            <th>ID</th>
                            <th>Priority</th>
                            <th>Title</th>
                            <th>Description</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>

                    </thead>

                    <tbody id="taskList">

                        <!-- JS Injected -->

                    </tbody>

                </table>

            </div>

            <!-- Pagination -->
            <div class="pagination">

                <button id="prevBtn" class="outline-btn">
                    Previous
                </button>

                <span id="pageInfo">
                    Page 1
                </span>

                <button id="nextBtn" class="outline-btn">
                    Next
                </button>

            </div>

        </section>

    </main>

</section>
